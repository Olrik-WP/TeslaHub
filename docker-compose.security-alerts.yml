# ─────────────────────────────────────────────────────────────────────────────
# TeslaHub — Optional Security Alerts stack
#
# Spins up Tesla's official Fleet Telemetry server which terminates the
# TLS WebSocket connection from each vehicle and re-publishes the events
# as MQTT messages on the existing Mosquitto broker (already running for
# TeslaMate). TeslaHub.Api subscribes to these MQTT topics and turns
# Sentry / break-in events into Telegram notifications.
#
# Why MQTT (and not Kafka / NATS / etc.):
#   - Tesla Fleet Telemetry only supports kafka / kinesis / pubsub /
#     logger / zmq / mqtt as record dispatchers (no NATS).
#   - You already have Mosquitto running for TeslaMate — no extra broker
#     needed.
#
# Tesla does not publish a pre-built image, so we build from source.
# Clone https://github.com/teslamotors/fleet-telemetry into
# ./fleet-telemetry-src first.
#
# Caddy must be configured to obtain a TLS cert for telemetry.<your-domain>
# (DNS-only on Cloudflare, see README "Security Alerts" section).
# The cert volume below is bind-mounted read-only into the container.
#
# Usage:
#   docker compose --profile security-alerts up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  fleet-telemetry:
    build:
      context: ./fleet-telemetry-src
      dockerfile: Dockerfile
    profiles: ["security-alerts"]
    restart: unless-stopped
    ports:
      # External 8443 forwarded by your router → 443 inside the container.
      - "${TELEMETRY_PORT:-8443}:443"
    volumes:
      # Caddy stores Let's Encrypt certs here when running as a systemd
      # service. Adjust the host path to match your install (e.g. for
      # Caddy in Docker, mount the named caddy_data volume instead).
      - ${CADDY_CERTS_PATH:-/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory}:/certs:ro
      - ./fleet-telemetry/config.json:/etc/fleet-telemetry/config.json:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
