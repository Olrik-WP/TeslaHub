# ─────────────────────────────────────────────────────────────────────────────
# TeslaHub — Optional Security Alerts stack
#
# Three extra services required for real-time Tesla Sentry / break-in alerts:
#
#   - fleet-telemetry        Tesla's official Go server. Terminates the TLS
#                            WebSocket from each vehicle and re-publishes
#                            events as MQTT messages on the existing
#                            Mosquitto broker.
#
#   - tesla-http-proxy-init  One-shot init container that generates a
#                            self-signed TLS cert for the local-only proxy
#                            endpoint on first run.
#
#   - tesla-http-proxy       Tesla's official Go HTTP proxy. Required by
#                            Tesla to sign Fleet API write calls (most
#                            notably fleet_telemetry_config) with the
#                            partner private key. Without it, Tesla rejects
#                            those calls with 400 "must be called through
#                            the Vehicle Command HTTP Proxy".
#
# Tesla does not publish pre-built images, so we build them locally:
#   - ./fleet-telemetry-src       (clone of teslamotors/fleet-telemetry)
#   - ./vehicle-command-src       (clone of teslamotors/vehicle-command)
#
# The partner private key needed by tesla-http-proxy lives encrypted in
# the TeslaHub PostgreSQL database. The user clicks "Export private key
# for the proxy" in the wizard once, which writes the decrypted key to a
# Docker volume (key-vault) shared between teslahub-api and the proxy.
#
# Usage:
#   docker compose --profile security-alerts up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  fleet-telemetry:
    build:
      context: ./fleet-telemetry-src
      dockerfile: Dockerfile
    profiles: ["security-alerts"]
    restart: unless-stopped
    ports:
      - "${TELEMETRY_PORT:-8443}:443"
    volumes:
      - ${CADDY_CERTS_PATH:-/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory}:/certs:ro
      - ./fleet-telemetry/config.json:/etc/fleet-telemetry/config.json:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  tesla-http-proxy-init:
    image: alpine:3.20
    profiles: ["security-alerts"]
    restart: "no"
    volumes:
      - key-vault:/key-vault
    command:
      - /bin/sh
      - -c
      - |
        set -e
        if [ ! -f /key-vault/proxy.crt ]; then
          echo "Generating self-signed TLS cert for tesla-http-proxy..."
          apk add --no-cache openssl
          openssl req -x509 -newkey rsa:2048 -nodes -keyout /key-vault/proxy.key \
            -out /key-vault/proxy.crt -days 3650 -subj "/CN=tesla-http-proxy"
          chmod 600 /key-vault/proxy.key
          chmod 644 /key-vault/proxy.crt
        else
          echo "TLS cert already present, skipping generation."
        fi

  tesla-http-proxy:
    build:
      context: ./vehicle-command-src
      dockerfile: Dockerfile
    profiles: ["security-alerts"]
    restart: unless-stopped
    depends_on:
      tesla-http-proxy-init:
        condition: service_completed_successfully
    environment:
      - TESLA_HTTP_PROXY_HOST=0.0.0.0
      - TESLA_HTTP_PROXY_PORT=4443
      - TESLA_HTTP_PROXY_TLS_CERT=/key-vault/proxy.crt
      - TESLA_HTTP_PROXY_TLS_KEY=/key-vault/proxy.key
      - TESLA_KEY_FILE=/key-vault/private.pem
    volumes:
      - key-vault:/key-vault
    expose:
      - "4443"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  key-vault:
