# ⚠️  EXAMPLE ONLY — for fresh installs where you want everything in one stack.
# If you already have TeslaMate running, do NOT use this file.
# Instead, add the teslahub services to YOUR existing docker-compose.yml.
# See README.md for instructions.

services:
  teslamate:
    image: teslamate/teslamate:latest
    restart: always
    environment:
      - ENCRYPTION_KEY=${TM_ENCRYPTION_KEY}
      - DATABASE_USER=${TM_DB_USER:-tm_user}
      - DATABASE_PASS=${TM_DB_PASS}
      - DATABASE_NAME=${TM_DB_NAME:-teslamate}
      - DATABASE_HOST=database
      - DISABLE_MQTT=true
      - TZ=${TZ:-Europe/Paris}
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      - database

  database:
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=${TM_DB_USER:-tm_user}
      - POSTGRES_PASSWORD=${TM_DB_PASS}
      - POSTGRES_DB=${TM_DB_NAME:-teslamate}
    volumes:
      - teslamate-db:/var/lib/postgresql/data
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  grafana:
    image: teslamate/grafana:latest
    restart: always
    environment:
      - DATABASE_USER=${TM_DB_USER:-tm_user}
      - DATABASE_PASS=${TM_DB_PASS}
      - DATABASE_NAME=${TM_DB_NAME:-teslamate}
      - DATABASE_HOST=database
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-grafana.localhost}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN:-grafana.localhost}
      - GF_SECURITY_COOKIE_SECURE=true
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - teslamate-grafana-data:/var/lib/grafana
    depends_on:
      - database

  # ─── TeslaHub ──────────────────────────────────────────────────
  teslahub-api:
    build:
      context: ./src/TeslaHub.Api
      dockerfile: Dockerfile
    restart: always
    environment:
      # TeslaMate DB — read only
      - TM_DB_HOST=database
      - TM_DB_PORT=5432
      - TM_DB_NAME=${TM_DB_NAME:-teslamate}
      - TM_DB_USER=teslahub_reader
      - TM_DB_PASSWORD=${TESLAHUB_READER_PASS}
      # App DB — TeslaHub owned
      - APP_DB_HOST=database
      - APP_DB_PORT=5432
      - APP_DB_NAME=teslahub
      - APP_DB_USER=teslahub_app
      - APP_DB_PASSWORD=${TESLAHUB_APP_PASS}
      # Auth
      - TESLAHUB_ADMIN_USER=${TESLAHUB_ADMIN_USER:-admin}
      - TESLAHUB_ADMIN_PASSWORD=${TESLAHUB_ADMIN_PASSWORD}
      - TESLAHUB_SESSION_DAYS=${TESLAHUB_SESSION_DAYS:-30}
      - TESLAHUB_JWT_SECRET=${TESLAHUB_JWT_SECRET}
      # Map
      - MAP_TILE_URL=${MAP_TILE_URL:-https://tile.openstreetmap.org/{z}/{x}/{y}.png}
      # Security — optional IP restriction (empty = allow all)
      - TESLAHUB_ALLOWED_IPS=${TESLAHUB_ALLOWED_IPS:-}
      - TZ=${TZ:-Europe/Paris}
    ports:
      - "127.0.0.1:4001:8080"
    depends_on:
      - database

  teslahub-web:
    build:
      context: ./src/TeslaHub.Web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:4002:80"
    depends_on:
      - teslahub-api
  # ────────────────────────────────────────────────────────────────

volumes:
  teslamate-db:
  teslamate-grafana-data:
