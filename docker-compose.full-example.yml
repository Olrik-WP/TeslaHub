# Full example — fresh install with TeslaMate + TeslaHub in one stack.
# If you already have TeslaMate running, do NOT use this file.
# Instead, add the services from docker-compose.addon.yml to YOUR existing compose file.
# See README.md for instructions.

services:
  teslamate:
    image: teslamate/teslamate:latest
    restart: always
    environment:
      - ENCRYPTION_KEY=${TM_ENCRYPTION_KEY}
      - DATABASE_USER=${TM_DB_USER:-teslamate}
      - DATABASE_PASS=${TM_DB_PASS}
      - DATABASE_NAME=${TM_DB_NAME:-teslamate}
      - DATABASE_HOST=database
      - MQTT_HOST=mosquitto
      - TZ=${TZ:-Europe/Paris}
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      - database

  database:
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=${TM_DB_USER:-teslamate}
      - POSTGRES_PASSWORD=${TM_DB_PASS}
      - POSTGRES_DB=${TM_DB_NAME:-teslamate}
    volumes:
      - teslamate-db:/var/lib/postgresql/data

  grafana:
    image: teslamate/grafana:latest
    restart: always
    environment:
      - DATABASE_USER=${TM_DB_USER:-teslamate}
      - DATABASE_PASS=${TM_DB_PASS}
      - DATABASE_NAME=${TM_DB_NAME:-teslamate}
      - DATABASE_HOST=database
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - teslamate-grafana-data:/var/lib/grafana
    depends_on:
      - database

  mosquitto:
    image: eclipse-mosquitto:2
    restart: always
    command: mosquitto -c /mosquitto-no-auth.conf
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data

  # ─── TeslaHub ──────────────────────────────────────────────────
  teslahub-init:
    image: deltawp/teslahub-init:latest
    restart: "no"
    environment:
      - TM_DB_HOST=database
      - TM_DB_PORT=5432
      - TM_DB_NAME=${TM_DB_NAME:-teslamate}
      - TM_DB_USER=${TM_DB_USER:-teslamate}
      - TM_DB_PASS=${TM_DB_PASS}
      - TESLAHUB_READER_PASS=${TESLAHUB_READER_PASS}
      - TESLAHUB_APP_PASS=${TESLAHUB_APP_PASS}
    depends_on:
      - database

  teslahub-api:
    image: deltawp/teslahub-api:latest
    restart: always
    environment:
      - TM_DB_HOST=database
      - TM_DB_PORT=5432
      - TM_DB_NAME=${TM_DB_NAME:-teslamate}
      - TM_DB_USER=teslahub_reader
      - TM_DB_PASSWORD=${TESLAHUB_READER_PASS}
      - APP_DB_HOST=database
      - APP_DB_PORT=5432
      - APP_DB_NAME=teslahub
      - APP_DB_USER=teslahub_app
      - APP_DB_PASSWORD=${TESLAHUB_APP_PASS}
      - TESLAHUB_ADMIN_USER=${TESLAHUB_ADMIN_USER:-admin}
      - TESLAHUB_ADMIN_PASSWORD=${TESLAHUB_ADMIN_PASSWORD}
      - TESLAHUB_SESSION_DAYS=${TESLAHUB_SESSION_DAYS:-30}
      - TESLAHUB_JWT_SECRET=${TESLAHUB_JWT_SECRET}
      - MAP_TILE_URL=${MAP_TILE_URL:-https://tile.openstreetmap.org/{z}/{x}/{y}.png}
      - TESLAHUB_ALLOWED_IPS=${TESLAHUB_ALLOWED_IPS:-}
      - MQTT_HOST=${MQTT_HOST:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_NAMESPACE=${MQTT_NAMESPACE:-}
      # Optional — Security Alerts (Tesla Fleet API). Leave empty to disable.
      # See README.md → "Security Alerts (optional)" for the full setup guide.
      - TESLA_CLIENT_ID=${TESLA_CLIENT_ID:-}
      - TESLA_CLIENT_SECRET=${TESLA_CLIENT_SECRET:-}
      - TESLA_REDIRECT_URI=${TESLA_REDIRECT_URI:-}
      - TESLA_AUDIENCE=${TESLA_AUDIENCE:-}
      - SECURITY_ALERTS_ENABLED=${SECURITY_ALERTS_ENABLED:-false}
      - TELEMETRY_DOMAIN=${TELEMETRY_DOMAIN:-}
      - TELEMETRY_PORT=${TELEMETRY_PORT:-8443}
      - TELEMETRY_MQTT_HOST=${TELEMETRY_MQTT_HOST:-mosquitto}
      - TELEMETRY_MQTT_PORT=${TELEMETRY_MQTT_PORT:-1883}
      - TELEMETRY_MQTT_USER=${TELEMETRY_MQTT_USER:-}
      - TELEMETRY_MQTT_PASSWORD=${TELEMETRY_MQTT_PASSWORD:-}
      - TELEMETRY_MQTT_TOPIC_BASE=${TELEMETRY_MQTT_TOPIC_BASE:-telemetry}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TZ=${TZ:-Europe/Paris}
    volumes:
      # Mount the Caddy certs read-only so the API can read the TLS
      # chain to send to Tesla when configuring telemetry. Optional.
      - ${CADDY_CERTS_PATH:-/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory}:/certs:ro
    ports:
      - "127.0.0.1:4001:8080"
    depends_on:
      - database
      - teslahub-init

  teslahub-web:
    image: deltawp/teslahub-web:latest
    restart: always
    ports:
      - "127.0.0.1:4002:80"
    depends_on:
      - teslahub-api
  # ────────────────────────────────────────────────────────────────

volumes:
  teslamate-db:
  teslamate-grafana-data:
  mosquitto-data:
